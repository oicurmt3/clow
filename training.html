<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clow — Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #e8eaee;
      --bg1: #f3f4f7;
      --bg2: #fafbfc;
      --surface: #ffffff;
      --border: #cfd3dc;
      --border-soft: #e2e5ec;
      --text: #1c2430;
      --text-muted: #5c6675;
      --text-faint: #8a93a3;
      --primary: #2f5d8c;
      --primary-hover: #254a70;
      --primary-soft: #e8f0f8;
      --secondary: #4a5568;
      --secondary-hover: #3a4352;
      --success: #2d6a4f;
      --success-soft: #e8f5ef;
      --warn: #9a6b1f;
      --warn-soft: #faf3e4;
      --shadow: 0 1px 2px rgba(28, 36, 48, 0.06), 0 4px 16px rgba(28, 36, 48, 0.06);
      --radius: 10px;
      --radius-sm: 6px;
      --font: "DM Sans", system-ui, sans-serif;
      --font-display: "Source Serif 4", Georgia, serif;
      --header-h: 56px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(47, 93, 140, 0.08), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(45, 106, 79, 0.06), transparent 50%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
      background-attachment: fixed;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    a { color: var(--primary); }
    h1, h2, h3 { font-family: var(--font-display); font-weight: 700; line-height: 1.2; margin: 0; }
    p { margin: 0; }
    code {
      font-family: inherit;
      font-size: 0.9em;
      font-weight: 600;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 2px 7px;
      border-radius: 999px;
    }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 40;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 20px;
      background: rgba(250, 251, 252, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-soft);
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }
    .brand-name {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand-tag {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 36px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
      text-decoration: none;
      color: inherit;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); color: #fff; }
    .btn-secondary { background: var(--secondary); color: #fff; }
    .btn-secondary:hover { background: var(--secondary-hover); color: #fff; }
    .btn-neutral {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-neutral:hover { background: var(--bg1); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
    }
    .btn-ghost:hover { background: var(--border-soft); color: var(--text); }
    .btn-sm { min-height: 30px; padding: 0 10px; font-size: 0.8rem; }
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 64px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .page-title {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .page-title h1 { font-size: 1.75rem; }
    .page-title .sub { color: var(--text-muted); margin-top: 4px; font-size: 0.95rem; }
    /* Training guide */
    .train-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 840px) {
      .train-layout { grid-template-columns: 1fr; }
    }
    .train-nav {
      position: sticky;
      top: calc(var(--header-h) + 16px);
      padding: 14px 12px;
    }
    @media (max-width: 840px) {
      .train-nav { position: static; }
    }
    .train-nav-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-faint);
      padding: 0 8px 8px;
    }
    .train-nav-link {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .train-nav-link:hover { background: var(--bg1); color: var(--text); }
    .train-nav-link.active {
      background: var(--primary-soft);
      color: var(--primary);
    }
    .train-nav-group {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border-soft);
    }
    .train-nav-group:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }
    .train-article {
      padding: 28px 32px 36px;
    }
    @media (max-width: 600px) {
      .train-article { padding: 20px 16px 28px; }
    }
    .train-kicker {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-faint);
      margin-bottom: 8px;
    }
    .train-article h1 {
      font-size: 1.85rem;
      margin-bottom: 10px;
    }
    .train-lead {
      font-size: 1.05rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      max-width: 52ch;
    }
    .train-article h2 {
      font-size: 1.25rem;
      margin: 28px 0 10px;
    }
    .train-article h3 {
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      margin: 18px 0 8px;
    }
    .train-article p {
      margin-bottom: 12px;
      color: var(--text);
      max-width: 62ch;
    }
    .train-article ul, .train-article ol {
      margin: 0 0 14px;
      padding-left: 1.25rem;
      max-width: 62ch;
    }
    .train-article li { margin-bottom: 6px; }
    .train-article li::marker { color: var(--text-faint); }
    .train-callout {
      margin: 18px 0;
      padding: 14px 16px;
      background: var(--bg1);
      border-left: 3px solid var(--primary);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      max-width: 62ch;
    }
    .train-callout.ok { border-left-color: var(--success); background: var(--success-soft); }
    .train-callout.warn { border-left-color: var(--warn); background: var(--warn-soft); }
    .train-callout strong { display: block; margin-bottom: 4px; }
    .train-callout p:last-child { margin-bottom: 0; }
    .train-steps {
      counter-reset: tstep;
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
      max-width: 62ch;
    }
    .train-steps li {
      counter-increment: tstep;
      position: relative;
      padding: 12px 12px 12px 48px;
      margin-bottom: 8px;
      background: var(--bg1);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-soft);
    }
    .train-steps li::before {
      content: counter(tstep);
      position: absolute;
      left: 12px;
      top: 12px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .train-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0 20px;
    }
    @media (max-width: 640px) {
      .train-grid { grid-template-columns: 1fr; }
    }
    .train-card {
      padding: 16px;
      background: var(--bg1);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
    }
    .train-card h3 { margin-top: 0; }
    .train-card p:last-child { margin-bottom: 0; color: var(--text-muted); font-size: 0.92rem; }
    .train-flow {
      margin: 14px 0 20px;
      max-width: 420px;
      padding: 4px 0;
    }
    .train-flow-step {
      position: relative;
      padding: 12px 14px 12px 18px;
      background: var(--bg1);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }
    .train-flow-step + .train-flow-arrow + .train-flow-step { margin-top: 0; }
    .train-flow-arrow {
      display: flex;
      justify-content: center;
      padding: 4px 0;
      color: var(--text-faint);
      font-size: 1.1rem;
      line-height: 1;
    }
    .train-formula {
      margin: 14px 0 20px;
      max-width: 520px;
      padding: 16px 18px;
      background: linear-gradient(180deg, var(--bg2), var(--bg1));
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .train-formula-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .train-formula-row:last-child { margin-bottom: 0; }
    .train-formula-label {
      flex: 0 0 auto;
      min-width: 3.2rem;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary);
    }
    .train-formula-label.else { color: var(--secondary); }
    .train-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text);
    }
    .train-chip.soft {
      background: var(--primary-soft);
      border-color: transparent;
      color: var(--primary);
    }
    .train-chip.join {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 5px 4px;
    }
    .train-formula-note {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--border-soft);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .train-example {
      margin: 14px 0 16px;
      max-width: 520px;
      padding: 16px 18px;
      background: var(--success-soft);
      border: 1px solid #c5e0d2;
      border-radius: var(--radius);
    }
    .train-example-title {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--success);
      margin-bottom: 10px;
    }
    .train-example-line {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .train-example-line .op {
      color: var(--text-muted);
      font-weight: 700;
      font-size: 0.8rem;
      margin: 0 4px;
    }
    .train-example-result {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #c5e0d2;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--success);
    }
    .train-link-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 18px;
      max-width: 640px;
    }
    .train-link-list a {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg1);
      border: 1px solid var(--border-soft);
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .train-link-list a:hover {
      background: var(--primary-soft);
      border-color: transparent;
      color: var(--primary);
    }
    .train-table {
      width: 100%;
      max-width: 720px;
      border-collapse: collapse;
      font-size: 0.88rem;
      margin: 12px 0 20px;
    }
    .train-table th, .train-table td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: top;
    }
    .train-table th {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-faint);
      font-weight: 700;
    }
    .train-pager {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border-soft);
    }
    .train-promo {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--primary-soft), var(--bg2));
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
    }
    .train-promo h2 {
      font-size: 1.15rem;
      margin-bottom: 4px;
    }
    .train-promo p {
      color: var(--text-muted);
      font-size: 0.92rem;
      max-width: 48ch;
    }
    .train-check {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
      max-width: 62ch;
    }
    .train-check li {
      position: relative;
      padding: 8px 0 8px 28px;
      border-bottom: 1px dashed var(--border-soft);
    }
    .train-check li:last-child { border-bottom: none; }
    .train-check li::before {
      content: "☐";
      position: absolute;
      left: 0;
      color: var(--text-faint);
    }


    @media print {
      .app-header, .no-print { display: none !important; }
      body { background: #fff; }
      .panel { box-shadow: none; border: none; }
      .main { max-width: none; padding: 0; }
      .train-nav { display: none; }
      .train-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="brand">
      <span class="brand-name">Clow</span>
      <span class="brand-tag">Training guide</span>
    </a>
    <div class="header-actions no-print">
      <a class="btn btn-ghost btn-sm" href="index.html">Open app</a>
      <button type="button" class="btn btn-primary btn-sm" id="btnPrint">Print chapter</button>
    </div>
  </header>
  <main class="main" id="app"></main>
  <script>
(function () {
  "use strict";

  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  const TRAIN_PAGES = [
    { id: "overview", group: "Start", title: "Welcome", kicker: "Start here" },
    { id: "concepts", group: "Start", title: "Core concepts", kicker: "Language of Clow" },
    { id: "library", group: "App tour", title: "Library & data", kicker: "App tour" },
    { id: "saving", group: "App tour", title: "Saving & backups", kicker: "App tour" },
    { id: "builder", group: "App tour", title: "Builder basics", kicker: "App tour" },
    { id: "controls", group: "App tour", title: "Answer controls", kicker: "App tour" },
    { id: "rules", group: "App tour", title: "IF / THEN rules", kicker: "App tour" },
    { id: "runner", group: "App tour", title: "Running a path", kicker: "App tour" },
    { id: "investigate", group: "Build for purpose", title: "Investigation Flows", kicker: "Purpose" },
    { id: "educate", group: "Build for purpose", title: "Education & training", kicker: "Purpose" },
    { id: "practice", group: "Practice", title: "Hands-on practice", kicker: "Practice" },
    { id: "reference", group: "Practice", title: "Quick reference", kicker: "Cheat sheet" }
  ];

  function trainPageMeta(id) {
    return TRAIN_PAGES.find((p) => p.id === id) || TRAIN_PAGES[0];
  }

  function trainContent(id) {
    const pages = {
      overview: `
        <p class="train-lead">Clow (“create + flow”) lets you build Flows: ordered steps that steer people toward relevant, robust evidence against key questions — whether they are investigating a live matter or learning how to think through one.</p>
        <div class="train-grid">
          <div class="train-card">
            <h3>Investigation Flows</h3>
            <p>Live runbooks (Flows): triage, escalate, gather evidence, and leave a path + action list you can print or export.</p>
          </div>
          <div class="train-card">
            <h3>Education / training Flows</h3>
            <p>Same engine, teaching intent: branch on judgment, show why a route matched, rehearse “what if” paths safely.</p>
          </div>
        </div>
        <h2>What you will learn</h2>
        <ul>
          <li>How the library, builder, and runner fit together</li>
          <li>How Clow saves Flows, runs, and preferences in this browser</li>
          <li>How to author questions, outcomes, and evidence actions</li>
          <li>How IF/THEN AND/OR rules route across current and prior answers</li>
          <li>Recipes for investigation vs education designs</li>
          <li>A practice path using the built-in demo</li>
        </ul>
        <div class="train-callout">
          <strong>Where your data lives</strong>
          <p>Clow has no server account. Flows, runs, and last Entity / case prefs live in this browser’s <code>localStorage</code>. Use Export for files you can keep, share, or move. See <a href="#saving">Saving &amp; backups</a>.</p>
        </div>
        <h2>Suggested path</h2>
        <ol class="train-steps">
          <li><strong>Concepts</strong> — learn the words Clow uses (key question, step, rule, run, path).</li>
          <li><strong>App tour</strong> — library → saving → builder → controls → rules → runner.</li>
          <li><strong>Purpose chapters</strong> — investigation recipe, then education/training recipe.</li>
          <li><strong>Practice</strong> — run the demo, then duplicate it into your own Flow.</li>
        </ol>
        <p>Use the left menu anytime, or bookmark a chapter from the Quick reference page.</p>
      `,
      concepts: `
        <p class="train-lead">Clow is built around one idea: a Flow should obtain relevant, robust evidence against key questions — not generate busywork.</p>
        <h2>Key terms</h2>
        <table class="train-table">
          <thead><tr><th>Term</th><th>Meaning</th></tr></thead>
          <tbody>
            <tr><td><strong>Flow</strong></td><td>A named set of steps you build once and run many times.</td></tr>
            <tr><td><strong>Key question</strong></td><td>The investigative (or teaching) question that evidence must answer.</td></tr>
            <tr><td><strong>Question step</strong></td><td>Asks for a choice (radio, checkbox, slider, etc.) then routes with rules.</td></tr>
            <tr><td><strong>Outcome step</strong></td><td>Checkpoint or ending: guidance, links, image, evidence actions. End here or continue.</td></tr>
            <tr><td><strong>Rule</strong></td><td>IF conditions (AND/OR) THEN go to a step. First match wins; ELSE is default next.</td></tr>
            <tr><td><strong>Run</strong></td><td>One walk through a Flow; answers and path are saved.</td></tr>
            <tr><td><strong>Entity</strong></td><td>Who or what the run is about — person, unit, agency, subject, or team (your convention). Shown on library cards and exports with the case number.</td></tr>
            <tr><td><strong>Path</strong></td><td>The sequence of answers (and route reasons) for that run.</td></tr>
            <tr><td><strong>Route reason</strong></td><td>Human line explaining which rule or ELSE chose the next step.</td></tr>
          </tbody>
        </table>
        <h2>Mental model</h2>
        <div class="train-flow" aria-label="How routing works">
          <div class="train-flow-step">Answer the current step</div>
          <div class="train-flow-arrow" aria-hidden="true">↓</div>
          <div class="train-flow-step">Build the answer map (prior answers + current)</div>
          <div class="train-flow-arrow" aria-hidden="true">↓</div>
          <div class="train-flow-step">Evaluate rules in order — first true wins</div>
          <div class="train-flow-arrow" aria-hidden="true">↓</div>
          <div class="train-flow-step">If none match, use ELSE (default next)</div>
          <div class="train-flow-arrow" aria-hidden="true">↓</div>
          <div class="train-flow-step">Show the next step + matched-rule reason</div>
        </div>
        <div class="train-callout ok">
          <strong>Design tip</strong>
          <p>Write steps so each one has one job. Put branching logic in rules, not in long prose prompts.</p>
        </div>
      `,
      library: `
        <p class="train-lead">The library is home: create Flows, resume or view runs, import/export, and open this training guide.</p>
        <h2>What you can do</h2>
        <ul>
          <li><strong>New Flow</strong> — blank starter with a question and an end outcome (saved immediately).</li>
          <li><strong>Run / Edit / Duplicate / Export</strong> — on each Flow card.</li>
          <li><strong>Reset demo</strong> — confirms, then restores the sample Flow and deletes that demo’s runs only.</li>
          <li><strong>Import / Export all</strong> — backup or move Flows and runs as JSON.</li>
          <li><strong>In progress</strong> — Resume, Export JSON, or Delete unfinished runs.</li>

    const raw = String(location.hash || "").replace(/^#/, "");

    const navHtml = TRAIN_PAGES.map((p) => {
      let groupHtml = "";
      if (p.group !== lastGroup) {
        lastGroup = p.group;
        groupHtml = '<div class="train-nav-group"><div class="train-nav-label">' + escapeHtml(p.group) + "</div></div>";
      }
      return groupHtml +
        '<button type="button" class="train-nav-link ' + (p.id === pageId ? "active" : "") +
        '" data-trainpage="' + p.id + '">' + escapeHtml(p.title) + "</button>";
    }).join("");

    document.getElementById("app").innerHTML =
      '<div class="page-title"><div>' +
        "<h1>Training</h1>" +
        '<p class="sub">How to use Clow for investigation Flows and education / training Flows.</p>' +
      "</div></div>" +
      '<div class="train-layout">' +
        '<nav class="panel train-nav no-print" aria-label="Training chapters">' + navHtml + "</nav>" +
        '<article class="panel train-article">' +
          '<div class="train-kicker">' + escapeHtml(meta.kicker) + "</div>" +
          "<h1>" + escapeHtml(meta.title) + "</h1>" +
          trainContent(pageId) +
          '<div class="train-pager no-print">' +
            (prev
              ? '<button type="button" class="btn btn-neutral" data-trainpage="' + prev.id + '">← ' + escapeHtml(prev.title) + "</button>"
              : "<span></span>") +
            (next
              ? '<button type="button" class="btn btn-primary" data-trainpage="' + next.id + '">' + escapeHtml(next.title) + " →</button>"
              : '<a class="btn btn-secondary" href="index.html">Finish · open app</a>') +
          "</div>" +
        "</article>" +
      "</div>";

    document.querySelectorAll("[data-trainpage]").forEach((btn) => {
      btn.onclick = () => goPage(btn.dataset.trainpage);
    });
    document.title = "Clow — Training · " + meta.title;
  }

  document.getElementById("btnPrint").onclick = () => window.print();
  window.addEventListener("hashchange", render);
  if (!location.hash) location.replace("#overview");
  else render();
})();
  </script>
</body>
</html>
