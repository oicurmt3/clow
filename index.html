      b.onclick = () => { app.selectedNodeId = b.dataset.sel; renderBuilder(); };
    });
    bindStepDragDrop(document.getElementById("stepList"), wf);

    renderNodeEditor(sel);
  }

  function addStep(kind) {
    const wf = app.draft;
    const id = uid("n");
    const firstOutcome = outcomeNodes(wf)[0];
    const fallback = firstOutcome ? firstOutcome.id : wf.startNodeId;
    let node;
    if (kind === "outcome") {
      node = {
        id, title: "Outcome", kind: "outcome",
        prompt: "Outcome", guidance: "", links: [], imageUrl: "",
        endHere: true, actions: ["Next action"]
      };
    } else {
      node = {
        id, title: "New step", kind: "question",
        prompt: "Question?", guidance: "", links: [],
        fieldType: "radio",
        options: [{ value: "a", label: "Option A" }, { value: "b", label: "Option B" }],
        defaultValue: "a",
        defaultRoute: fallback,
        rules: []
      };
      node.rules = [
        createRule({ conditions: [createCondition(id, "eq", "a")], then: fallback }),
        createRule({ conditions: [createCondition(id, "eq", "b")], then: fallback })
      ];
    }
    wf.nodes[id] = node;
    ensureStepOrder(wf);
    if (!wf.stepOrder.includes(id)) wf.stepOrder.push(id);
    app.selectedNodeId = id;
    renderBuilder();
  }

  function addPreset(type) {
    const wf = app.draft;
    const id = uid("n");
    const firstOutcome = outcomeNodes(wf)[0];
    const fallback = firstOutcome ? firstOutcome.id : wf.startNodeId;
    let node;
    if (type === "yesno") {
      node = {
        id, title: "Yes / No", kind: "question",
        prompt: "Yes or no?", guidance: "", links: [],
        fieldType: "radio",
        options: [{ value: "yes", label: "Yes" }, { value: "no", label: "No" }],
        defaultValue: "yes",
        defaultRoute: fallback,
        rules: [
          createRule({ conditions: [createCondition(id, "eq", "yes")], then: fallback }),
          createRule({ conditions: [createCondition(id, "eq", "no")], then: fallback })
        ]
      };
    } else if (type === "toggle") {
      node = {
        id, title: "Toggle", kind: "question",
        prompt: "Is this true?", guidance: "", links: [],
        fieldType: "toggle",
        options: [{ value: "yes", label: "Yes" }, { value: "no", label: "No" }],
        defaultValue: "no",
        defaultRoute: fallback,
        rules: [
          createRule({ conditions: [createCondition(id, "eq", "yes")], then: fallback }),
          createRule({ conditions: [createCondition(id, "eq", "no")], then: fallback })
        ]
      };
    } else if (type === "cycle") {
      node = {
        id, title: "Severity", kind: "question",
        prompt: "Severity?", guidance: "Tap to cycle.", links: [],
        fieldType: "cycle",
        options: [
          { value: "low", label: "Low" },
          { value: "medium", label: "Medium" },
          { value: "high", label: "High" }
        ],
        defaultValue: "low",
        defaultRoute: fallback,
        rules: [
          createRule({ conditions: [createCondition(id, "eq", "low")], then: fallback }),
          createRule({ conditions: [createCondition(id, "eq", "medium")], then: fallback }),
          createRule({ conditions: [createCondition(id, "eq", "high")], then: fallback })
        ]
      };
    } else if (type === "checkpoint" || type === "info") {
      node = {
        id, title: "Checkpoint", kind: "outcome",
        prompt: "Review this checkpoint", guidance: "Evidence or Flow note, then continue.",
        links: [], imageUrl: "", endHere: false, actions: [], next: fallback
      };
    } else {
      node = {
        id, title: "Outcome", kind: "outcome",
        prompt: "Outcome", guidance: "", links: [], imageUrl: "",
        endHere: true, actions: ["Action to take"]
      };
    }
    wf.nodes[id] = node;
    ensureStepOrder(wf);
    if (!wf.stepOrder.includes(id)) wf.stepOrder.push(id);
    app.selectedNodeId = id;
    renderBuilder();
  }

  function targetOptionsHtml(wf, selected) {
    const opts = getOrderedSteps(wf)
      .filter((n) => n.id !== app.selectedNodeId)
      .map((n) => `<option value="${n.id}" ${n.id === selected ? "selected" : ""}>${escapeHtml(nodeLabel(n))} (${n.kind})</option>`)
      .join("");
    return `<option value="">— select —</option>${opts}`;
  }

  function questionStepOptionsHtml(wf, selected, includeCurrent) {
    const opts = getOrderedSteps(wf)
      .filter((n) => n.kind === "question")
      .filter((n) => includeCurrent || n.id !== app.selectedNodeId)
      .map((n) => `<option value="${n.id}" ${n.id === selected ? "selected" : ""}>${escapeHtml(nodeLabel(n))}</option>`)
      .join("");
    return `<option value="">— step —</option>${opts}`;
  }

  function conditionOpsForStep(step) {
    if (!step) return [["eq", "equals"], ["neq", "not equals"]];
    if (step.fieldType === "checkbox") {
      return [["includes", "includes"], ["excludes", "excludes"]];
    }
    if (step.fieldType === "slider") {
      return [["in_band", "in band"], ["eq", "equals"], ["neq", "not equals"]];
    }
    return [["eq", "equals"], ["neq", "not equals"]];
  }

  function conditionValueOptionsHtml(wf, stepId, selected) {
    const step = wf.nodes[stepId];
    if (!step || step.kind !== "question") return `<option value="">— value —</option>`;
    let html = "";
    let known = false;
    if (step.fieldType === "slider") {
      const bands = (step.slider && step.slider.bands) || [];
      known = bands.some((b) => b.routeKey === selected);
      html = `<option value="">— band —</option>` + bands.map((b) =>
        `<option value="${escapeHtml(b.routeKey)}" ${b.routeKey === selected ? "selected" : ""}>${escapeHtml(b.label)} (≤${b.max})</option>`
      ).join("");
    } else {
      known = (step.options || []).some((o) => o.value === selected);
      html = `<option value="">— value —</option>` + (step.options || []).map((o) =>
        `<option value="${escapeHtml(o.value)}" ${o.value === selected ? "selected" : ""}>${escapeHtml(o.label)}</option>`
      ).join("");
    }
    if (selected && !known) {
      html += `<option value="${escapeHtml(String(selected))}" selected>(missing) ${escapeHtml(String(selected))}</option>`;
    }
    return html;
  }

  function renderRulesEditorHtml(wf, node) {
    ensureQuestionRules(node);
    const rules = node.rules || [];
    return `
      <div class="form-row" id="rulesSection">
        <label class="field-label">Routing rules (IF / THEN)</label>
        <p class="field-hint">First matching rule wins. Conditions can use this step or earlier answers. Combine with AND/OR. ELSE is the default next below.</p>
        <div id="rulesEditor">
          ${rules.map((rule, ri) => `
            <div class="rule-card" data-ruleindex="${ri}">
              <div class="rule-head">
                <div class="rule-head-left">
                  <span class="drag-handle" draggable="true" title="Drag to reorder" aria-label="Drag to reorder">⋮⋮</span>
                  <strong>Rule ${ri + 1}</strong>
                  <div class="segmented" data-rulejoin="${ri}">
                    <button type="button" data-join="and" class="${rule.join !== "or" ? "active" : ""}">AND</button>
                    <button type="button" data-join="or" class="${rule.join === "or" ? "active" : ""}">OR</button>
                  </div>
                </div>
                <button type="button" class="btn btn-icon btn-danger-ghost" data-delrule="${ri}" title="Delete rule" aria-label="Delete rule">
                  <span class="material-symbols-outlined" aria-hidden="true">delete</span>
                </button>
              </div>
              ${(rule.conditions || []).map((c, ci) => {
                const step = wf.nodes[c.stepId];
                const ops = conditionOpsForStep(step);
                const orphan = c.stepId && step && step.kind === "question" && c.value !== undefined && c.value !== "" && !conditionValueExists(wf, c);
                return `
                  <div class="cond-row${orphan ? " cond-invalid" : ""}">
                    <select data-cond-step="${ri}:${ci}">${questionStepOptionsHtml(wf, c.stepId, true)}</select>
                    <select data-cond-op="${ri}:${ci}">
                      ${ops.map(([v, lab]) => `<option value="${v}" ${c.op === v ? "selected" : ""}>${lab}</option>`).join("")}
                    </select>
                    <select data-cond-val="${ri}:${ci}">${conditionValueOptionsHtml(wf, c.stepId, c.value)}</select>
                    <button type="button" class="btn btn-ghost btn-sm" data-delcond="${ri}:${ci}">Remove</button>
                    ${orphan ? `<span class="cond-invalid-hint">Missing option or band “${escapeHtml(String(c.value))}” — pick a valid value or fix the referenced step.</span>` : ""}
                  </div>`;
              }).join("")}
              <button type="button" class="btn btn-neutral btn-sm" data-addcond="${ri}">Add condition</button>
              <div class="rule-then">
                <label class="field-label">THEN go to</label>
                <select data-rulethen="${ri}">${targetOptionsHtml(wf, rule.then)}</select>
              </div>
            </div>`).join("") || `<p class="muted">No rules yet — add one, or use “Make rule” on an option.</p>`}
        </div>
        <button type="button" class="btn btn-secondary btn-sm" id="btnAddRule" style="margin-top:8px">Add rule</button>
      </div>
      <div class="form-row">
        <label class="field-label">ELSE (default next)</label>
        <select id="defaultRoute">${targetOptionsHtml(wf, node.defaultRoute)}</select>
        <p class="field-hint">Used when no IF rule matches.</p>
      </div>`;
  }

  function renderNodeEditor(node) {
    const host = document.getElementById("nodeEditor");
    const wf = app.draft;
    if (!node || !host) {
      if (host) host.innerHTML = "<p class='muted'>Select a step.</p>";
      return;
    }

    migrateInfoToOutcome(node);
    const kindOpts = ["question", "outcome"].map((k) =>
      `<option value="${k}" ${node.kind === k ? "selected" : ""}>${k}</option>`).join("");

    let extra = "";
    if (node.kind === "outcome") {
      normalizeOutcome(node);
      const actions = node.actions || [];
      const endHere = isTerminalOutcome(node);
      extra = `
        <div class="form-row">
          <label class="field-label">After this outcome</label>
          <div class="segmented" id="endHereToggle">
            <button type="button" data-endhere="true" class="${endHere ? "active" : ""}">End here</button>
            <button type="button" data-endhere="false" class="${!endHere ? "active" : ""}">Continue to next step</button>
          </div>
          <p class="field-hint">End here closes with a path and evidence actions. Continue is a checkpoint (evidence plan, links, image) before the next step.</p>
        </div>
        ${!endHere ? `
          <div class="form-row">
            <label class="field-label">Next step</label>
            <select id="outcomeNext">${targetOptionsHtml(wf, node.next)}</select>
          </div>` : ""}
        <div class="form-row">
          <label class="field-label">Image URL (optional)</label>
          <input type="url" id="outcomeImage" value="${escapeHtml(node.imageUrl || "")}" placeholder="https://…" />
          <p class="field-hint">Reference image for this evidence step (full https URL).</p>
        </div>
        <div class="form-row">
          <label class="field-label">Evidence / actions to take</label>
          <div class="action-list" id="actionList">
            ${actions.map((a, i) => `
              <div class="action-row">
                <input type="text" data-action="${i}" value="${escapeHtml(a)}" />
                <button class="btn btn-ghost btn-sm" data-delaction="${i}">Remove</button>
              </div>`).join("")}
          </div>
          <button class="btn btn-neutral btn-sm" id="btnAddAction" style="margin-top:8px">Add action</button>
        </div>`;
    } else {
      ensureQuestionRules(node);
      const fieldTypes = ["radio", "checkbox", "toggle", "cycle", "select", "slider"];
      const ftOpts = fieldTypes.map((t) =>
        `<option value="${t}" ${node.fieldType === t ? "selected" : ""}>${t}</option>`).join("");
      const options = node.options || [];
      extra = `
        <div class="form-row">
          <label class="field-label">Control type</label>
          <select id="fieldType">${ftOpts}</select>
        </div>`;

      if (node.fieldType === "slider") {
        if (!node.slider) {
          node.slider = {
            min: 0, max: 10, step: 1,
            bands: [
              { max: 3, label: "Low", routeKey: "low" },
              { max: 7, label: "Medium", routeKey: "medium" },
              { max: 10, label: "High", routeKey: "high" }
            ]
          };
        }
        extra += `
          <div class="form-row two">
            <div class="form-row">
              <label class="field-label">Min</label>
              <input type="number" id="sliderMin" value="${node.slider.min}" />
            </div>
            <div class="form-row">
              <label class="field-label">Max</label>
              <input type="number" id="sliderMax" value="${node.slider.max}" />
            </div>
          </div>
          <div class="form-row">
            <label class="field-label">Default value</label>
            <input type="number" id="defaultValue" value="${escapeHtml(String(node.defaultValue ?? 0))}" />
          </div>
          <div class="form-row">
            <label class="field-label">Bands</label>
            <p class="field-hint">Use band keys in IF rules with “in band”. Renaming a key updates all rules that use it across the Flow.</p>
            ${(node.slider.bands || []).map((b, i) => `
              <div class="route-row" style="margin-top:8px">
                <div>
                  <label class="field-label">Band ≤ max — label</label>
                  <input type="text" data-bandlabel="${i}" value="${escapeHtml(b.label)}" placeholder="Label" />
                  <input type="number" data-bandmax="${i}" value="${b.max}" style="margin-top:6px" />
                  <label class="field-label" style="margin-top:8px">Band key (used in rules)</label>
                  <input type="text" data-bandkey="${i}" value="${escapeHtml(b.routeKey)}" placeholder="key" />
                </div>
                <div>
                  <button type="button" class="btn btn-neutral btn-sm" data-bandrule="${i}">Make rule</button>
                </div>
              </div>`).join("")}
          </div>`;
      } else {
        const isCheckbox = node.fieldType === "checkbox";
        extra += `
          <div class="form-row">
            <label class="field-label">Options</label>
            <p class="field-hint">Drag ⋮⋮ to reorder. Labels are safe to rename. Changing a value (or an auto-value from the label) updates every rule that uses it across the Flow.</p>
            <div class="option-editor" id="optEditor">
              <div class="option-head" aria-hidden="true">
                <span></span>
                <span>Label</span>
                <span>Value</span>
                <span></span>
                <span></span>
              </div>
              ${options.map((o, i) => `
                <div class="option-row" data-optindex="${i}" draggable="false">
                  <span class="drag-handle" draggable="true" title="Drag to reorder" aria-label="Drag to reorder">⋮⋮</span>
                  <input type="text" data-optlabel="${i}" value="${escapeHtml(o.label)}" placeholder="Label" aria-label="Label" />
                  <input type="text" data-optvalue="${i}" value="${escapeHtml(o.value)}" placeholder="Value" aria-label="Value" />
                  <button type="button" class="btn btn-neutral btn-sm" data-makerule="${i}" title="Make IF/THEN rule">Make rule</button>
                  <button type="button" class="btn btn-icon btn-danger-ghost" data-delopt="${i}" title="Delete option" aria-label="Delete option">
                    <span class="material-symbols-outlined" aria-hidden="true">delete</span>
                  </button>
                </div>`).join("")}
            </div>
            <button class="btn btn-neutral btn-sm" id="btnAddOpt" style="margin-top:8px">Add option</button>
          </div>
          <div class="form-row">
            <label class="field-label">Default value</label>
            ${isCheckbox
              ? `<p class="field-hint">Checkbox default is empty selection.</p>`
              : `<select id="defaultValue">${options.map((o) =>
                  `<option value="${escapeHtml(o.value)}" ${o.value === node.defaultValue ? "selected" : ""}>${escapeHtml(o.label)}</option>`
                ).join("")}</select>`}
          </div>`;
      }
      extra += renderRulesEditorHtml(wf, node);
    }

    const linksBlock = `
      <div class="form-row">
        <label class="field-label">Links</label>
        <div id="linkEditor">
          ${(node.links || []).map((l, i) => `
            <div class="link-row" style="margin-bottom:8px">
              <input type="text" data-linklabel="${i}" value="${escapeHtml(l.label)}" placeholder="Label" />
              <input type="url" data-linkurl="${i}" value="${escapeHtml(l.url)}" placeholder="https://" />
              <button class="btn btn-ghost btn-sm" data-dellink="${i}">Remove</button>
            </div>`).join("")}
        </div>
        <button class="btn btn-neutral btn-sm" id="btnAddLink">Add link</button>
      </div>`;

    host.innerHTML = `
      <div class="form-grid">
        <div class="form-row two">
          <div class="form-row">
            <label class="field-label">Step title</label>
            <input type="text" id="nodeTitle" value="${escapeHtml(node.title || "")}" />
          </div>
          <div class="form-row">
            <label class="field-label">Kind</label>
            <select id="nodeKind">${kindOpts}</select>
          </div>
        </div>
        <div class="form-row">
          <label class="field-label">Key question / prompt</label>
          <textarea id="nodePrompt">${escapeHtml(node.prompt || "")}</textarea>
          <p class="field-hint">State the key question or decision this step addresses.</p>
        </div>
        <div class="form-row">
          <label class="field-label">Flow guidance</label>
          <textarea id="nodeGuidance">${escapeHtml(node.guidance || "")}</textarea>
          <p class="field-hint">How to obtain relevant, robust evidence here — tips, policy refs, what to ask for.</p>
        </div>
        ${linksBlock}
        ${extra}
        <div class="alert" style="margin:0">
          <strong>Route preview:</strong>
          <div class="field-hint" style="margin-top:6px">${escapeHtml(routePreview(wf, node))}</div>
        </div>
      </div>
    `;

    host.querySelector("#nodeTitle").oninput = (e) => { node.title = e.target.value; syncStepListTitle(); };
    host.querySelector("#nodePrompt").oninput = (e) => { node.prompt = e.target.value; };
    host.querySelector("#nodeGuidance").oninput = (e) => { node.guidance = e.target.value; };
    host.querySelector("#nodeKind").onchange = (e) => {
      convertKind(node, e.target.value);
      renderBuilder();
    };

    const addLink = host.querySelector("#btnAddLink");
    if (addLink) {
      addLink.onclick = () => {
        if (!node.links) node.links = [];
        node.links.push({ label: "Link", url: "https://" });
        renderNodeEditor(node);
      };
      host.querySelectorAll("[data-linklabel]").forEach((inp) => {
        inp.oninput = () => { node.links[+inp.dataset.linklabel].label = inp.value; };
      });
      host.querySelectorAll("[data-linkurl]").forEach((inp) => {
        inp.oninput = () => { node.links[+inp.dataset.linkurl].url = inp.value; };
      });
      host.querySelectorAll("[data-dellink]").forEach((btn) => {
        btn.onclick = () => { node.links.splice(+btn.dataset.dellink, 1); renderNodeEditor(node); };
      });
    }

    if (node.kind === "outcome") {
      host.querySelectorAll("#endHereToggle [data-endhere]").forEach((btn) => {
        btn.onclick = () => {
          const end = btn.dataset.endhere === "true";
          node.endHere = end;
          if (!end) {
            const firstTerminal = outcomeNodes(wf).find((o) => o.id !== node.id && isTerminalOutcome(o));
            node.next = node.next || (firstTerminal && firstTerminal.id) || wf.startNodeId;
          }
          renderBuilder();
        };
      });
      const img = host.querySelector("#outcomeImage");
      if (img) img.oninput = (e) => { node.imageUrl = e.target.value.trim(); };
      const nextSel = host.querySelector("#outcomeNext");
      if (nextSel) nextSel.onchange = (e) => { node.next = e.target.value; renderNodeEditor(node); };
      host.querySelector("#btnAddAction").onclick = () => {
        if (!node.actions) node.actions = [];
        node.actions.push("New action");
        renderNodeEditor(node);
      };
      host.querySelectorAll("[data-action]").forEach((inp) => {
        inp.oninput = () => { node.actions[+inp.dataset.action] = inp.value; };
      });
      host.querySelectorAll("[data-delaction]").forEach((btn) => {
        btn.onclick = () => { node.actions.splice(+btn.dataset.delaction, 1); renderNodeEditor(node); };
      });
    } else {
      host.querySelector("#fieldType").onchange = (e) => {
        node.fieldType = e.target.value;
        if (node.fieldType === "checkbox") node.defaultValue = [];
        else if (node.fieldType === "slider") {
          node.defaultValue = 5;
          node.slider = node.slider || {
            min: 0, max: 10, step: 1,
            bands: [
              { max: 3, label: "Low", routeKey: "low" },
              { max: 7, label: "Medium", routeKey: "medium" },
              { max: 10, label: "High", routeKey: "high" }
            ]
          };
        } else if (Array.isArray(node.defaultValue)) {
          node.defaultValue = (node.options[0] && node.options[0].value) || "";
        }
        renderNodeEditor(node);
      };
      const dr = host.querySelector("#defaultRoute");
      if (dr) dr.onchange = (e) => { node.defaultRoute = e.target.value; renderNodeEditor(node); };

      if (node.fieldType === "slider") {
        host.querySelector("#sliderMin").oninput = (e) => { node.slider.min = +e.target.value; };
        host.querySelector("#sliderMax").oninput = (e) => { node.slider.max = +e.target.value; };
        host.querySelector("#defaultValue").oninput = (e) => { node.defaultValue = +e.target.value; };
        host.querySelectorAll("[data-bandlabel]").forEach((inp) => {
          inp.oninput = () => { node.slider.bands[+inp.dataset.bandlabel].label = inp.value; };
        });
        host.querySelectorAll("[data-bandmax]").forEach((inp) => {
          inp.oninput = () => { node.slider.bands[+inp.dataset.bandmax].max = +inp.value; };
        });
        host.querySelectorAll("[data-bandkey]").forEach((inp) => {
          inp.onchange = () => {
            const n = setBandRouteKey(node, +inp.dataset.bandkey, inp.value, wf);
            if (n) toast(`Updated ${n} condition${n === 1 ? "" : "s"} across the Flow`);
            renderNodeEditor(node);
          };
        });
        host.querySelectorAll("[data-bandrule]").forEach((btn) => {
          btn.onclick = () => {
            const i = +btn.dataset.bandrule;
            const band = node.slider.bands[i];
            ensureQuestionRules(node);
            node.rules.push(createRule({
              join: "and",
              conditions: [createCondition(node.id, "in_band", band.routeKey)],
              then: node.defaultRoute || ""
            }));
            toast("Rule added — set THEN go to");
            renderNodeEditor(node);
          };
        });
      } else {
        const btnAddOpt = host.querySelector("#btnAddOpt");
        if (btnAddOpt) {
          btnAddOpt.onclick = () => {
            const label = "Option " + (node.options.length + 1);
            const v = uniqueOptionValue(node, composeOptionValue(node, label));
            node.options.push({ value: v, label });
            renderNodeEditor(node);
          };
        }
        host.querySelectorAll("[data-optlabel]").forEach((inp) => {
          inp.oninput = () => {
            node.options[+inp.dataset.optlabel].label = inp.value;
          };
          inp.onblur = () => {
            const i = +inp.dataset.optlabel;
            const opt = node.options[i];
            if (!opt) return;
            opt.label = inp.value;
            const titlePart = slugifyOptionPart(node.title) || "step";
            const prefix = titlePart + "_";
            const val = String(opt.value || "").trim();
            // Empty or auto-style values (title_…) stay in sync with the label and cascade to rules.
            if (!val || val.startsWith(prefix)) {
              const n = setOptionValue(node, i, composeOptionValue(node, opt.label), wf);
              if (n) toast(`Updated ${n} condition${n === 1 ? "" : "s"} across the Flow`);
              renderNodeEditor(node);
            }
          };
        });
        host.querySelectorAll("[data-optvalue]").forEach((inp) => {
          inp.onchange = () => {
            const n = setOptionValue(node, +inp.dataset.optvalue, inp.value, wf);
            if (n) toast(`Updated ${n} condition${n === 1 ? "" : "s"} across the Flow`);
            renderNodeEditor(node);
          };
        });
        host.querySelectorAll("[data-makerule]").forEach((btn) => {
          btn.onclick = () => {
            const i = +btn.dataset.makerule;
            const opt = node.options[i];
            if (!opt) return;
            ensureQuestionRules(node);
            const op = node.fieldType === "checkbox" ? "includes" : "eq";
            node.rules.push(createRule({
              join: "and",
              conditions: [createCondition(node.id, op, opt.value)],
              then: node.defaultRoute || ""
            }));
            toast("Rule added — set THEN go to");
            renderNodeEditor(node);
          };
        });
        host.querySelectorAll("[data-delopt]").forEach((btn) => {
          btn.onclick = () => {
            const i = +btn.dataset.delopt;
            const opt = node.options[i];
            if (!opt) return;
            const label = opt.label || opt.value || "this option";
            const refs = countAnswerValueRefs(wf, node.id, opt.value);
            showModal({
              title: "Delete option?",
              body: `<p>Remove “${escapeHtml(label)}”?${refs
                ? ` This will also remove <strong>${refs}</strong> condition${refs === 1 ? "" : "s"} (and any rules left empty) across the Flow.`
                : ""}</p>`,
              actions: [
                { label: "Cancel", className: "btn-neutral", onClick: closeModal },
                {
                  label: "Delete",
                  className: "btn-danger",
                  onClick: () => {
                    const val = node.options[i].value;
                    const cleared = removeAnswerValueRefs(wf, node.id, val);
                    node.options.splice(i, 1);
                    if (node.defaultValue === val) {
                      node.defaultValue = (node.options[0] && node.options[0].value) || "";
                    }
                    closeModal();
                    if (cleared.removedConds) {
                      toast(`Removed ${cleared.removedConds} condition${cleared.removedConds === 1 ? "" : "s"}` +
                        (cleared.removedRules ? ` · ${cleared.removedRules} empty rule${cleared.removedRules === 1 ? "" : "s"}` : ""));
                    }
                    renderNodeEditor(node);
                  }
                }
              ]
            });
          };
        });
        bindOptionDragDrop(host.querySelector("#optEditor"), node);
        const dv = host.querySelector("#defaultValue");
        if (dv) dv.onchange = (e) => { node.defaultValue = e.target.value; };
      }
      bindRulesEditor(host, wf, node);
    }
  }

  function bindRulesEditor(host, wf, node) {
    ensureQuestionRules(node);
    const addRule = host.querySelector("#btnAddRule");
    if (addRule) {
      addRule.onclick = () => {
        const firstOpt = (node.options && node.options[0] && node.options[0].value) || "";
        const op = node.fieldType === "checkbox" ? "includes" : (node.fieldType === "slider" ? "in_band" : "eq");
        const val = node.fieldType === "slider"
          ? ((node.slider && node.slider.bands[0] && node.slider.bands[0].routeKey) || "low")
          : firstOpt;
        node.rules.push(createRule({
          join: "and",
          conditions: [createCondition(node.id, op, val)],
          then: node.defaultRoute || ""
        }));
        renderNodeEditor(node);
      };
    }
    host.querySelectorAll("[data-rulejoin]").forEach((seg) => {
      const ri = +seg.dataset.rulejoin;
      seg.querySelectorAll("[data-join]").forEach((btn) => {
        btn.onclick = () => {
          node.rules[ri].join = btn.dataset.join;
          renderNodeEditor(node);
        };
      });
    });
    host.querySelectorAll("[data-delrule]").forEach((btn) => {
      btn.onclick = () => {
        const ri = +btn.dataset.delrule;
        showModal({
          title: "Delete rule?",
          body: `<p>Remove rule ${ri + 1}?</p>`,
          actions: [
            { label: "Cancel", className: "btn-neutral", onClick: closeModal },
            {
              label: "Delete", className: "btn-danger", onClick: () => {
                node.rules.splice(ri, 1);
                closeModal();
                renderNodeEditor(node);
              }
            }
          ]
        });
      };
    });
    host.querySelectorAll("[data-addcond]").forEach((btn) => {
      btn.onclick = () => {
        const ri = +btn.dataset.addcond;
        const op = node.fieldType === "checkbox" ? "includes" : "eq";
        const val = (node.options && node.options[0] && node.options[0].value) || "";
        if (!node.rules[ri].conditions) node.rules[ri].conditions = [];
        node.rules[ri].conditions.push(createCondition(node.id, op, val));
        renderNodeEditor(node);
      };
    });
    host.querySelectorAll("[data-delcond]").forEach((btn) => {
      btn.onclick = () => {
        const [ri, ci] = btn.dataset.delcond.split(":").map(Number);
        node.rules[ri].conditions.splice(ci, 1);
        if (!node.rules[ri].conditions.length) {
          node.rules[ri].conditions.push(createCondition(node.id, "eq", ""));
        }
        renderNodeEditor(node);
      };
    });
    host.querySelectorAll("[data-cond-step]").forEach((sel) => {
      sel.onchange = () => {
        const [ri, ci] = sel.dataset.condStep.split(":").map(Number);
        const step = wf.nodes[sel.value];
        const ops = conditionOpsForStep(step);
        node.rules[ri].conditions[ci].stepId = sel.value;
        node.rules[ri].conditions[ci].op = ops[0][0];
        if (step && step.fieldType === "slider") {
          node.rules[ri].conditions[ci].value = (step.slider && step.slider.bands[0] && step.slider.bands[0].routeKey) || "";
        } else {
          node.rules[ri].conditions[ci].value = (step && step.options && step.options[0] && step.options[0].value) || "";
        }
        renderNodeEditor(node);
      };
    });
    host.querySelectorAll("[data-cond-op]").forEach((sel) => {
      sel.onchange = () => {
        const [ri, ci] = sel.dataset.condOp.split(":").map(Number);
        node.rules[ri].conditions[ci].op = sel.value;
      };
    });
    host.querySelectorAll("[data-cond-val]").forEach((sel) => {
      sel.onchange = () => {
        const [ri, ci] = sel.dataset.condVal.split(":").map(Number);
        node.rules[ri].conditions[ci].value = sel.value;
      };
    });
    host.querySelectorAll("[data-rulethen]").forEach((sel) => {
      sel.onchange = () => {
        node.rules[+sel.dataset.rulethen].then = sel.value;
        renderNodeEditor(node);
      };
    });
    bindRuleDragDrop(host.querySelector("#rulesEditor"), node);
  }

  function bindRuleDragDrop(list, node) {
    if (!list || !node || !Array.isArray(node.rules)) return;
    let dragFrom = null;
    let placeAfter = false;
    list.querySelectorAll(".rule-card").forEach((row) => {
      const handle = row.querySelector(".drag-handle");
      if (!handle) return;
      handle.addEventListener("dragstart", (e) => {
        dragFrom = +row.dataset.ruleindex;
        placeAfter = false;
        row.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", String(dragFrom));
        try { e.dataTransfer.setDragImage(row, 20, 20); } catch (_) { /* ignore */ }
      });
      handle.addEventListener("dragend", () => {
        dragFrom = null;
        placeAfter = false;
        clearDropLines(list, ".rule-card");
      });
      row.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        if (dragFrom === null) return;
        placeAfter = setDropLine(list, ".rule-card", row, e.clientY);
      });
      row.addEventListener("dragleave", (e) => {
        if (!row.contains(e.relatedTarget)) row.classList.remove("drop-before", "drop-after");
      });
      row.addEventListener("drop", (e) => {
        e.preventDefault();
        const from = dragFrom != null ? dragFrom : parseInt(e.dataTransfer.getData("text/plain"), 10);
        const to = +row.dataset.ruleindex;
        const after = row.classList.contains("drop-after") || placeAfter;
        clearDropLines(list, ".rule-card");
        dragFrom = null;
        placeAfter = false;
        if (Number.isNaN(from) || Number.isNaN(to)) return;
        if (reorderWithDropLine(node.rules, from, to, after)) renderNodeEditor(node);
      });
    });
  }

  function clearDropLines(root, itemSelector) {
    if (!root) return;
    root.querySelectorAll(itemSelector).forEach((el) => {
      el.classList.remove("drop-before", "drop-after", "dragging", "drag-over");
    });
  }

  function setDropLine(root, itemSelector, row, clientY) {
    root.querySelectorAll(itemSelector).forEach((el) => {
      el.classList.remove("drop-before", "drop-after");
    });
    const rect = row.getBoundingClientRect();
    const placeAfter = clientY > rect.top + rect.height / 2;
    row.classList.add(placeAfter ? "drop-after" : "drop-before");
    return placeAfter;
  }

  /** Reorder array in place. `to` is hover index; `placeAfter` inserts after that item. */
  function reorderWithDropLine(arr, from, to, placeAfter) {
    if (!arr || from < 0 || to < 0 || from >= arr.length || to >= arr.length) return false;
    let insertAt = placeAfter ? to + 1 : to;
    if (from === insertAt || from + 1 === insertAt) return false;
    const moved = arr.splice(from, 1)[0];
    if (from < insertAt) insertAt -= 1;
    arr.splice(insertAt, 0, moved);
    return true;
  }

  function bindOptionDragDrop(editor, node) {
    if (!editor || !node || !Array.isArray(node.options)) return;
    let dragFrom = null;
    let placeAfter = false;

    editor.querySelectorAll(".option-row").forEach((row) => {
      const handle = row.querySelector(".drag-handle");
      if (!handle) return;

      handle.addEventListener("dragstart", (e) => {
        dragFrom = +row.dataset.optindex;
        placeAfter = false;
        row.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", String(dragFrom));
        try {
          e.dataTransfer.setDragImage(row, 20, 20);
        } catch (_) { /* ignore */ }
      });

      handle.addEventListener("dragend", () => {
        dragFrom = null;
        placeAfter = false;
        clearDropLines(editor, ".option-row");
      });

      row.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        if (dragFrom === null) return;
        placeAfter = setDropLine(editor, ".option-row", row, e.clientY);
      });

      row.addEventListener("dragleave", (e) => {
        if (!row.contains(e.relatedTarget)) {
          row.classList.remove("drop-before", "drop-after");
        }
      });

      row.addEventListener("drop", (e) => {
        e.preventDefault();
        const from = dragFrom != null ? dragFrom : parseInt(e.dataTransfer.getData("text/plain"), 10);
        const to = +row.dataset.optindex;
        const after = row.classList.contains("drop-after") || placeAfter;
        clearDropLines(editor, ".option-row");
        dragFrom = null;
        placeAfter = false;
        if (Number.isNaN(from) || Number.isNaN(to)) return;
        if (reorderWithDropLine(node.options, from, to, after)) {
          renderNodeEditor(node);
        }
      });
    });
  }

  function bindStepDragDrop(list, wf) {
    if (!list || !wf) return;
    ensureStepOrder(wf);
    let dragFrom = null;
    let placeAfter = false;

    list.querySelectorAll(".step-li").forEach((row) => {
      const handle = row.querySelector(".drag-handle");
      if (!handle) return;

      handle.addEventListener("dragstart", (e) => {
        dragFrom = +row.dataset.stepindex;
        placeAfter = false;
        row.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", String(dragFrom));
        try {
          e.dataTransfer.setDragImage(row, 20, 20);
        } catch (_) { /* ignore */ }
      });

      handle.addEventListener("dragend", () => {
        dragFrom = null;
        placeAfter = false;
        clearDropLines(list, ".step-li");
      });

      row.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        if (dragFrom === null) return;
        placeAfter = setDropLine(list, ".step-li", row, e.clientY);
      });

      row.addEventListener("dragleave", (e) => {
        if (!row.contains(e.relatedTarget)) {
          row.classList.remove("drop-before", "drop-after");
        }
      });

      row.addEventListener("drop", (e) => {
        e.preventDefault();
        const from = dragFrom != null ? dragFrom : parseInt(e.dataTransfer.getData("text/plain"), 10);
        const to = +row.dataset.stepindex;
        const after = row.classList.contains("drop-after") || placeAfter;
        clearDropLines(list, ".step-li");
        dragFrom = null;
        placeAfter = false;
        if (Number.isNaN(from) || Number.isNaN(to)) return;
        ensureStepOrder(wf);
        if (reorderWithDropLine(wf.stepOrder, from, to, after)) {
          renderBuilder();
        }
      });
    });
  }

  function syncStepListTitle() {
    // light refresh of side list titles without full re-render of editor focus
    const wf = app.draft;
    document.querySelectorAll("[data-sel]").forEach((btn) => {
      const n = wf.nodes[btn.dataset.sel];
      if (!n) return;
      const t = btn.querySelector(".si-title");
      if (t) t.textContent = n.title || "Untitled";
    });
  }

  function convertKind(node, kind) {
    const wf = app.draft;
    const firstOutcome = outcomeNodes(wf)[0];
    const fallback = firstOutcome ? firstOutcome.id : wf.startNodeId;
    node.kind = kind;
    if (kind === "outcome") {
      delete node.fieldType;
      delete node.options;
      delete node.routes;
      delete node.rules;
      delete node.defaultRoute;
      delete node.defaultValue;
      delete node.slider;
      if (!node.links) node.links = [];
      if (node.imageUrl == null) node.imageUrl = "";
      if (node.endHere === undefined) node.endHere = true;
      if (!node.actions) node.actions = ["Next action"];
      if (node.endHere === false) node.next = node.next || fallback;
      else delete node.next;
    } else {
      if (kind === "info") {
        node.kind = "outcome";
        node.endHere = false;
        if (!node.links) node.links = [];
        if (node.imageUrl == null) node.imageUrl = "";
        if (!node.actions) node.actions = [];
        node.next = node.next || fallback;
        delete node.fieldType;
        delete node.options;
        delete node.routes;
        delete node.rules;
        delete node.defaultRoute;
        delete node.defaultValue;
        delete node.slider;
        return;
      }
      delete node.actions;
      delete node.next;
      delete node.imageUrl;
      delete node.endHere;
      if (!node.links) node.links = [];
      node.fieldType = node.fieldType || "radio";
      node.options = node.options || [
        { value: "yes", label: "Yes" },
        { value: "no", label: "No" }
      ];
      node.defaultValue = node.defaultValue ?? "yes";
      node.defaultRoute = node.defaultRoute || fallback;
      if (!Array.isArray(node.rules) || !node.rules.length) {
        node.rules = (node.options || []).map((o) => createRule({
          join: "and",
          conditions: [createCondition(node.id, "eq", o.value)],
          then: fallback
        }));
      }
      delete node.routes;
    }
  }

  function routePreview(wf, node) {
    if (!node) return "";
    migrateInfoToOutcome(node);
    if (node.kind === "outcome") {
      normalizeOutcome(node);
      if (isTerminalOutcome(node)) {
        return `End here · ${(node.actions || []).length} action(s)`;
      }
      return `Continue → ${nodeLabel(wf.nodes[node.next])} · ${(node.actions || []).length} action(s)`;
    }
    ensureQuestionRules(node);
    const bits = (node.rules || []).map((r) => {
      const join = (r.join || "and").toUpperCase();
      const conds = (r.conditions || []).map((c) => formatConditionText(wf, c)).join(` ${join} `);
      return `IF ${conds || "(empty)"} THEN ${nodeLabel(wf.nodes[r.then])}`;
    });
    bits.push(`ELSE ${nodeLabel(wf.nodes[node.defaultRoute])}`);
    return bits.join(" · ");
  }

  // ─── Runner ────────────────────────────────────────────
  function startRun(workflowId, opts = {}) {
    const wf = getWorkflow(workflowId);
    if (!wf) return;
    const errs = validateWorkflow(wf);
    if (errs.length && !opts.test) {
      showModal({
        title: "Flow has issues",
        body: `<ul>${errs.map((e) => `<li>${escapeHtml(e)}</li>`).join("")}</ul><p>Edit the flow to fix these before running.</p>`,
        actions: [
          { label: "Cancel", className: "btn-neutral", onClick: closeModal },
          { label: "Edit", className: "btn-secondary", onClick: () => { closeModal(); openBuilder(workflowId); } }
        ]
      });
      return;
    }
    const last = loadLastRunner();
    const userName = opts.test ? (last.userName || "Tester") : (last.userName || "");
    const caseNumber = opts.test ? (last.caseNumber || "TEST") : (last.caseNumber || "");
    const run = {
      id: uid("run"),
      workflowId: wf.id,
      userName,
      caseNumber,
      name: composeRunName({ userName, caseNumber, test: !!opts.test }) || (opts.test ? "Test run" : "New run"),
      status: "in_progress",
      createdAt: now(),
      updatedAt: now(),
      isTest: !!opts.test,
      currentNodeId: wf.startNodeId,
      answers: [],
      actions: [],
      actionMarks: {}
    };
    saveRun(run);
    openRunner(run.id);
  }

  function applyRunMetaFromInputs(run) {
    const nameEl = document.getElementById("runUserName");
    const caseEl = document.getElementById("runCaseNumber");
    if (!nameEl && !caseEl) return true;
    const userName = (nameEl && nameEl.value ? nameEl.value : "").trim();
    const caseNumber = (caseEl && caseEl.value ? caseEl.value : "").trim();
    if (!userName || !caseNumber) {
      toast("Enter entity and case number");
      return false;
    }
    run.userName = userName;
    run.caseNumber = caseNumber;
    run.name = composeRunName({
      userName: run.userName,
      caseNumber: run.caseNumber,
      test: !!run.isTest
    });
    saveLastRunner(run.userName, run.caseNumber);
    return true;
  }

  const ACTION_STATUSES = ["null", "done", "na"];
  const ACTION_STATUS_LABELS = { null: "To do", done: "Done", na: "N/A" };

  function actionMarkKey(nodeId, index) {
    return nodeId + ":" + index;
  }

  function getActionMark(run, nodeId, index) {
    if (!run.actionMarks) run.actionMarks = {};
    const v = run.actionMarks[actionMarkKey(nodeId, index)];
    return ACTION_STATUSES.includes(v) ? v : "null";
  }

  function cycleActionMark(run, nodeId, index) {
    const cur = getActionMark(run, nodeId, index);
    const next = ACTION_STATUSES[(ACTION_STATUSES.indexOf(cur) + 1) % ACTION_STATUSES.length];
    if (!run.actionMarks) run.actionMarks = {};
    run.actionMarks[actionMarkKey(nodeId, index)] = next;
    saveRun(run);
    return next;
  }

  function renderActionStatusCycle(run, nodeId, index) {
    const cur = getActionMark(run, nodeId, index);
    return `
      <button type="button"
        class="status-cycle"
        data-action-node="${escapeHtml(nodeId)}"
        data-action-index="${index}"
        data-status="${cur}"
        title="Tap to cycle: To do → Done → N/A"
        aria-label="Status ${ACTION_STATUS_LABELS[cur]}. Tap to cycle.">
        <span class="status-cycle-label">${ACTION_STATUS_LABELS[cur]}</span>
      </button>`;
  }

  function renderActionsListHtml(run, nodeId, actions) {
    if (!actions || !actions.length) {
      return `<li class="muted" style="display:block">No evidence actions listed</li>`;
    }
    return actions.map((a, i) => `
      <li>
        <span class="action-text">${escapeHtml(a)}</span>
        ${renderActionStatusCycle(run, nodeId, i)}
      </li>`).join("");
  }

  function bindActionStatusCycles(root, run) {
    if (!root) return;
    root.querySelectorAll(".status-cycle").forEach((btn) => {
      btn.onclick = () => {
        const next = cycleActionMark(run, btn.dataset.actionNode, +btn.dataset.actionIndex);
        btn.dataset.status = next;
        const label = btn.querySelector(".status-cycle-label");
        if (label) label.textContent = ACTION_STATUS_LABELS[next];
        btn.setAttribute("aria-label", "Status " + ACTION_STATUS_LABELS[next] + ". Tap to cycle.");
      };
    });
  }

  function pathExportBasename(run) {
    const bits = [run.caseNumber, run.userName].filter(Boolean).join("-") || run.name || "run";
    const base = "clow-path-" + slug(bits);
    return run.status === "completed" ? base : base + "-partial";
  }

  function buildRunExportPayload(run, wf) {
    const cur = wf && wf.nodes ? wf.nodes[run.currentNodeId] : null;
    return {
      type: "clow-run",
      version: 1,
      exportedAt: now(),
      partial: run.status !== "completed",
      workflowName: wf ? wf.name : "",
      workflowId: run.workflowId,
      userName: run.userName || "",
      caseNumber: run.caseNumber || "",
      title: runDisplayTitle(run),
      currentStep: cur ? nodeLabel(cur) : (run.currentNodeId || ""),
      run: deepClone(run)
    };
  }

  function collectRunActionRows(run, wf) {
    const rows = [];
    const seen = new Set();
    const pushNode = (nodeId) => {
      if (!nodeId || seen.has(nodeId) || !wf.nodes[nodeId]) return;
      seen.add(nodeId);
      const n = wf.nodes[nodeId];
      if (n.kind !== "outcome") return;
      normalizeOutcome(n);
      (n.actions || []).forEach((text, index) => {
        rows.push({
          step: nodeLabel(n),
          text,
          status: ACTION_STATUS_LABELS[getActionMark(run, nodeId, index)] || "To do"
        });
      });
    };
    (run.answers || []).forEach((a) => pushNode(a.nodeId));
    pushNode(run.currentNodeId);
    return rows;
  }

  function buildRunReportHtml(run, wf) {
    const partial = run.status !== "completed";
    const cur = wf.nodes[run.currentNodeId];
    const statusLabel = partial ? "In progress" : "Complete";
    const actionRows = collectRunActionRows(run, wf);
    const pathItems = (run.answers || []).map((a) => `
      <li>
        <div class="q">${escapeHtml(a.prompt || a.title || "")}</div>
        <div class="a">${escapeHtml(a.display != null ? String(a.display) : "")}</div>
        ${a.routeReason ? `<div class="why">${escapeHtml(a.routeReason)}</div>` : ""}
      </li>`).join("") || `<li class="muted">No path steps recorded yet.</li>`;

    const actionsHtml = actionRows.length
      ? actionRows.map((r) => `
          <li>
            <span class="step">${escapeHtml(r.step)}</span>
            <span class="act">${escapeHtml(r.text)}</span>
            <span class="st">${escapeHtml(r.status)}</span>
          </li>`).join("")
      : `<li class="muted">No evidence actions recorded.</li>`;

    return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>${escapeHtml(wf.name)} — ${escapeHtml(runDisplayTitle(run))}</title>
  <style>
    body { font-family: Georgia, "Times New Roman", serif; color: #1c2430; background: #f3f4f7; margin: 0; padding: 24px; line-height: 1.45; }
    .wrap { max-width: 720px; margin: 0 auto; background: #fff; border: 1px solid #e2e5ec; border-radius: 10px; padding: 28px 32px; }
    h1 { font-size: 1.6rem; margin: 0 0 6px; }
    h2 { font-size: 1.1rem; margin: 28px 0 10px; border-bottom: 1px solid #e2e5ec; padding-bottom: 6px; }
    .sub { color: #5c6675; margin: 0 0 16px; font-family: system-ui, sans-serif; font-size: 0.92rem; }
    .meta { font-family: system-ui, sans-serif; font-size: 0.85rem; color: #5c6675; margin: 0 0 8px; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #e8f0f8; color: #2f5d8c; font-family: system-ui, sans-serif; font-size: 0.75rem; font-weight: 700; }
    .tag.warn { background: #faf3e4; color: #9a6b1f; }
    .note { font-family: system-ui, sans-serif; font-size: 0.88rem; background: #faf3e4; border-left: 3px solid #9a6b1f; padding: 10px 12px; margin: 16px 0; color: #5c6675; }
    ol.path, ul.actions { list-style: none; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    ol.path li, ul.actions li { padding: 12px 0; border-bottom: 1px solid #e2e5ec; }
    ol.path .q { color: #5c6675; font-size: 0.82rem; }
    ol.path .a { font-weight: 700; margin-top: 2px; }
    ol.path .why { color: #8a93a3; font-size: 0.78rem; margin-top: 4px; }
    ul.actions li { display: grid; grid-template-columns: 1.2fr 2fr auto; gap: 10px; align-items: start; font-size: 0.9rem; }
    ul.actions .step { color: #5c6675; }
    ul.actions .st { font-weight: 700; color: #2f5d8c; white-space: nowrap; }
    .muted { color: #8a93a3; }
    @media print {
      body { background: #fff; padding: 0; }
      .wrap { border: none; box-shadow: none; max-width: none; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="meta"><span class="tag${partial ? " warn" : ""}">${statusLabel}</span></p>
    <h1>${escapeHtml(wf.name)}</h1>
    <p class="sub">${escapeHtml(runDisplayTitle(run))}</p>
    <p class="meta">Entity: ${escapeHtml(run.userName || "—")}</p>
    <p class="meta">Case number: ${escapeHtml(run.caseNumber || "—")}</p>
    <p class="meta">Exported ${escapeHtml(fmtDate(now()))}</p>
    ${partial ? `<p class="meta">Current step: ${escapeHtml(cur ? nodeLabel(cur) : "(unknown)")}</p>
    <div class="note">This is a mid-Flow snapshot. The path may grow if the run continues.</div>` : ""}
    <h2>Methodology path</h2>
    <ol class="path">${pathItems}</ol>
    <h2>Evidence / actions</h2>
    <ul class="actions">${actionsHtml}</ul>
  </div>
</body>
</html>`;
  }

  function exportRunJson(run, wf) {
    const name = pathExportBasename(run) + ".json";
    downloadJson(name, buildRunExportPayload(run, wf));
    toast("Path exported (JSON)");
  }

  function exportRunHtml(run, wf) {
    const name = pathExportBasename(run) + ".html";
    downloadText(name, buildRunReportHtml(run, wf), "text/html;charset=utf-8");
    toast("Path report exported (HTML)");
  }

  function bindRunExportButtons(root, run, wf) {
    if (!root) return;
    const j = root.querySelector("#btnExpJson");
    const h = root.querySelector("#btnExpHtml");
    if (j) j.onclick = () => exportRunJson(run, wf);
    if (h) h.onclick = () => exportRunHtml(run, wf);
  }

  function openRunner(runId) {
    const run = getRun(runId);
    if (!run) { navigate("library"); return; }
    const wf = getWorkflow(run.workflowId);
    if (!wf) { toast("Flow missing for this run"); navigate("library"); return; }
    const node = wf.nodes[run.currentNodeId];
    app.runnerValue = initRunnerValue(node);
    navigate("runner", { runId, workflowId: run.workflowId });
  }

  function initRunnerValue(node) {
    if (!node || node.kind !== "question") return null;
    if (node.fieldType === "checkbox") return Array.isArray(node.defaultValue) ? [...node.defaultValue] : [];
    if (node.fieldType === "slider") return Number(node.defaultValue ?? (node.slider && node.slider.min) ?? 0);
    return node.defaultValue != null ? node.defaultValue : (node.options[0] && node.options[0].value);
  }

  function renderRunner() {
    document.querySelector(".main").classList.remove("wide");
    const run = getRun(app.runId);
    const wf = run && getWorkflow(run.workflowId);
    if (!run || !wf) { navigate("library"); return; }

    const node = wf.nodes[run.currentNodeId];
    if (node && node.kind === "outcome") normalizeOutcome(node);
    const isDone = run.status === "completed" || (node && isTerminalOutcome(node));

    setHeaderActions(`
      <button class="btn btn-ghost btn-sm" id="btnLeaveRun">${app.testMode || run.isTest ? "Back to builder" : "Library"}</button>
      <button class="btn btn-neutral btn-sm" id="btnPrint">Print</button>
      <button class="btn btn-neutral btn-sm" id="btnExpJson">Export JSON</button>
      <button class="btn btn-neutral btn-sm" id="btnExpHtml">Export HTML</button>
    `, (el) => {
      el.querySelector("#btnLeaveRun").onclick = () => {
        if (run.isTest || app.testMode) {
          app.testMode = false;
          openBuilder(wf.id);
        } else {
          navigate("library");
        }
      };
      const pr = el.querySelector("#btnPrint");
      if (pr) pr.onclick = () => window.print();
      bindRunExportButtons(el, run, wf);
    });

    if (!node) {
      document.getElementById("app").innerHTML = `<div class="alert error">Missing step. <button class="btn btn-neutral btn-sm" id="goLib">Library</button></div>`;
      document.getElementById("goLib").onclick = () => navigate("library");
      return;
    }

    if (isTerminalOutcome(node) && run.status !== "completed") {
      run.status = "completed";
      run.actions = node.actions || [];
      run.completedAt = now();
      saveRun(run);
    }

    if (run.status === "completed" || isTerminalOutcome(node)) {
      renderEndScreen(run, wf, node);
      return;
    }

    const stepNum = run.answers.length + 1;
    const remaining = estimateRemaining(wf, node.id);
    const isCheckpoint = node.kind === "outcome" && !isTerminalOutcome(node);
    const nextLabel = isCheckpoint ? "Continue" : "Next";
    const lastAnswer = run.answers.length ? run.answers[run.answers.length - 1] : null;
    const arrivalReason = lastAnswer && lastAnswer.routeReason ? lastAnswer.routeReason : "";

    document.getElementById("app").innerHTML = `
      <div class="runner">
        <div class="runner-progress">
          <span>${escapeHtml(wf.name)}${run.caseNumber || run.userName ? " · " + escapeHtml(runDisplayTitle(run)) : ""}</span>
          <span>Step ${stepNum} · ~${remaining} left</span>
        </div>
        <div class="panel runner-card">
          ${run.answers.length === 0 ? `
            <div class="run-meta-fields" style="margin-bottom:18px">
              <div class="form-row">
                <label class="field-label" for="runUserName">Entity</label>
                <input type="text" id="runUserName" value="${escapeHtml(run.userName || "")}" placeholder="Entity" autocomplete="organization" />
              </div>
              <div class="form-row">
                <label class="field-label" for="runCaseNumber">Case number</label>
                <input type="text" id="runCaseNumber" value="${escapeHtml(run.caseNumber || "")}" placeholder="e.g. 2026-00421" autocomplete="off" />
              </div>
            </div>` : ""}
          ${arrivalReason ? `<p class="route-reason arrival">${escapeHtml(arrivalReason)}</p>` : ""}
          <div class="runner-title">${escapeHtml(node.title || "")}${isCheckpoint ? ' <span class="tag">Checkpoint</span>' : ""}</div>
          <h2 class="runner-prompt">${escapeHtml(node.prompt || "")}</h2>
          ${node.guidance ? `<div class="runner-guidance">${escapeHtml(node.guidance)}</div>` : ""}
          ${node.imageUrl ? `<img class="outcome-image" src="${escapeHtml(node.imageUrl)}" alt="" />` : ""}
          ${(node.links && node.links.length) ? `
            <div class="runner-links">
              ${node.links.map((l) => `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.label || l.url)}</a>`).join("")}
            </div>` : ""}
          ${isCheckpoint && (node.actions || []).length ? `
            <div class="summary-block" style="margin-top:0;margin-bottom:16px" id="actionsBlock">
              <h3>Evidence / actions</h3>
              <ul class="actions-list">
                ${renderActionsListHtml(run, node.id, node.actions)}
              </ul>
            </div>` : ""}
          <div class="control-block" id="controlBlock"></div>
          <div class="runner-actions">
            <button class="btn btn-neutral btn-lg" id="btnBack" ${run.answers.length ? "" : "disabled"}>Back</button>
            <button class="btn btn-primary btn-lg" id="btnNext">${nextLabel}</button>
          </div>
          ${run.answers.length ? `
            <div class="history-trail">
              <h3>Path so far</h3>
              ${run.answers.map((a) => pathAnswerHtml(a)).join("")}
            </div>` : ""}
        </div>
      </div>
    `;

    mountControl(node);
    bindActionStatusCycles(document.getElementById("actionsBlock"), run);
    document.getElementById("btnBack").onclick = () => runnerBack(run, wf);
    document.getElementById("btnNext").onclick = () => runnerNext(run, wf, node);
  }

  function mountControl(node) {
    const host = document.getElementById("controlBlock");
    if (!host) return;
    migrateInfoToOutcome(node);
    if (node.kind === "outcome") {
      host.innerHTML = isTerminalOutcome(node)
        ? ""
        : `<p class="muted">Review this checkpoint, then continue.</p>`;
      return;
    }

    const ft = node.fieldType;
    if (ft === "radio") {
      host.innerHTML = `
        <div class="radio-list">
          ${(node.options || []).map((o) => `
            <label class="choice">
              <input type="radio" name="ans" value="${escapeHtml(o.value)}" ${app.runnerValue === o.value ? "checked" : ""} />
              <span>${escapeHtml(o.label)}</span>
            </label>`).join("")}
        </div>`;
      host.querySelectorAll("input").forEach((inp) => {
        inp.onchange = () => { app.runnerValue = inp.value; };
      });
    } else if (ft === "checkbox") {
      const selected = new Set(Array.isArray(app.runnerValue) ? app.runnerValue : []);
      host.innerHTML = `
        <div class="check-list">
          ${(node.options || []).map((o) => `
            <label class="choice">
              <input type="checkbox" value="${escapeHtml(o.value)}" ${selected.has(o.value) ? "checked" : ""} />
              <span>${escapeHtml(o.label)}</span>
            </label>`).join("")}
        </div>
        <div class="current-value">Selected: <span class="val" id="curVal">${escapeHtml(optionLabel(node, [...selected]))}</span></div>`;
      host.querySelectorAll("input").forEach((inp) => {
        inp.onchange = () => {
          const vals = [...host.querySelectorAll("input:checked")].map((x) => x.value);
          app.runnerValue = vals;
          document.getElementById("curVal").textContent = optionLabel(node, vals);
        };
      });
    } else if (ft === "toggle") {
      const onVal = (node.options[0] && node.options[0].value) || "yes";
      const offVal = (node.options[1] && node.options[1].value) || "no";
      const isOn = app.runnerValue === onVal;
      const label = isOn
        ? ((node.options[0] && node.options[0].label) || "On")
        : ((node.options[1] && node.options[1].label) || "Off");
      host.innerHTML = `
        <div class="toggle-wrap">
          <button type="button" class="toggle-switch ${isOn ? "on" : ""}" id="tog" aria-pressed="${isOn}"></button>
          <span class="toggle-label" id="togLabel">${escapeHtml(label)}</span>
        </div>
        <div class="current-value">Current: <span class="val">${escapeHtml(label)}</span></div>`;
      host.querySelector("#tog").onclick = () => {
        app.runnerValue = app.runnerValue === onVal ? offVal : onVal;
        mountControl(node);
      };
    } else if (ft === "cycle") {
      const opts = node.options || [];
      let idx = opts.findIndex((o) => o.value === app.runnerValue);
      if (idx < 0) idx = 0;
      const cur = opts[idx] || { label: "—", value: "" };
      host.innerHTML = `
        <button type="button" class="cycle-btn" id="cycleBtn">${escapeHtml(cur.label)}</button>
        <div class="cycle-hint">Tap to cycle choices</div>
        <div class="current-value">Current: <span class="val">${escapeHtml(cur.label)}</span></div>`;
      host.querySelector("#cycleBtn").onclick = () => {
        const next = (idx + 1) % opts.length;
        app.runnerValue = opts[next].value;
        mountControl(node);
      };
    } else if (ft === "select") {
      host.innerHTML = `
        <select class="runner-select" id="sel">
          ${(node.options || []).map((o) =>
            `<option value="${escapeHtml(o.value)}" ${o.value === app.runnerValue ? "selected" : ""}>${escapeHtml(o.label)}</option>`
          ).join("")}
        </select>
        <div class="current-value">Current: <span class="val" id="curVal">${escapeHtml(optionLabel(node, app.runnerValue))}</span></div>`;
      host.querySelector("#sel").onchange = (e) => {
        app.runnerValue = e.target.value;
        document.getElementById("curVal").textContent = optionLabel(node, app.runnerValue);
      };
    } else if (ft === "slider") {
      const min = (node.slider && node.slider.min) ?? 0;
      const max = (node.slider && node.slider.max) ?? 10;
      const step = (node.slider && node.slider.step) ?? 1;
      const val = Number(app.runnerValue);
      const band = sliderBand(node, val);
      host.innerHTML = `
        <div class="slider-wrap">
          <input type="range" id="rng" min="${min}" max="${max}" step="${step}" value="${val}" />
          <div class="slider-labels"><span>${min}</span><span>${max}</span></div>
        </div>
        <div class="current-value">Current: <span class="val" id="curVal">${val}${band ? " · " + band.label : ""}</span></div>`;
      host.querySelector("#rng").oninput = (e) => {
        app.runnerValue = Number(e.target.value);
        const b = sliderBand(node, app.runnerValue);
        document.getElementById("curVal").textContent =
          app.runnerValue + (b ? " · " + b.label : "");
      };
    }
  }

  function runnerNext(run, wf, node) {
    if (run.answers.length === 0 && !applyRunMetaFromInputs(run)) return;
    migrateInfoToOutcome(node);
    if (node.kind === "outcome" && !isTerminalOutcome(node)) {
      const nextId = node.next;
      if (!nextId || !wf.nodes[nextId]) {
        toast("Next step missing");
        return;
      }
      run.answers.push({
        nodeId: node.id,
        title: node.title,
        prompt: node.prompt,
        value: "checkpoint",
        display: "Evidence checkpoint reviewed",
        routeReason: `Continue → ${nodeLabel(wf.nodes[nextId])}`
      });
      run.currentNodeId = nextId;
      saveRun(run);
      const next = wf.nodes[nextId];
      app.runnerValue = initRunnerValue(next);
      render();
      return;
    }

    let value = app.runnerValue;
    if (node.fieldType === "checkbox") {
      value = Array.isArray(value) ? value : [];
    }
    if (node.fieldType !== "checkbox" && (value === undefined || value === null || value === "")) {
      toast("Choose an answer");
      return;
    }

    const { nextId, reason } = resolveRouteDetail(wf, node, run, value);
    if (!nextId || !wf.nodes[nextId]) {
      toast("No matching rule / ELSE — check routing rules");
      return;
    }
    run.answers.push({
      nodeId: node.id,
      title: node.title,
      prompt: node.prompt,
      value,
      display: optionLabel(node, value),
      routeReason: reason
    });
    run.currentNodeId = nextId;
    saveRun(run);
    const next = wf.nodes[nextId];
    app.runnerValue = initRunnerValue(next);
    render();
  }

  function runnerBack(run, wf) {
    if (!run.answers.length) return;
    const last = run.answers.pop();
    run.currentNodeId = last.nodeId;
    run.status = "in_progress";
    run.actions = [];
    delete run.completedAt;
    saveRun(run);
    const node = wf.nodes[run.currentNodeId];
    app.runnerValue = last.value != null ? deepClone(last.value) : initRunnerValue(node);
    render();
  }

  function renderEndScreen(run, wf, node) {
    const outcome = node && isTerminalOutcome(node) ? node : wf.nodes[run.currentNodeId];
    if (outcome && outcome.kind === "outcome") normalizeOutcome(outcome);
    const actions = (outcome && outcome.actions) || run.actions || [];
    if (!run.actionMarks) run.actionMarks = {};
    const lastAnswer = run.answers.length ? run.answers[run.answers.length - 1] : null;
    const arrivalReason = lastAnswer && lastAnswer.routeReason ? lastAnswer.routeReason : "";

    document.getElementById("app").innerHTML = `
      <div class="runner end-screen">
        <div class="runner-progress">
          <span>${escapeHtml(wf.name)}${run.caseNumber || run.userName ? " · " + escapeHtml(runDisplayTitle(run)) : ""}</span>
          <span class="tag ok">Complete</span>
        </div>
        <div class="panel runner-card">
          ${arrivalReason ? `<p class="route-reason arrival">${escapeHtml(arrivalReason)}</p>` : ""}
          <div class="runner-title">${escapeHtml(runDisplayTitle(run))}</div>
          <p class="muted" style="margin:0 0 10px;font-size:0.88rem">
            ${run.userName ? escapeHtml(run.userName) : "—"}${run.caseNumber ? " · Case " + escapeHtml(run.caseNumber) : ""}
          </p>
          <h2 class="runner-prompt">${escapeHtml((outcome && outcome.prompt) || "Complete")}</h2>
          ${outcome && outcome.guidance ? `<div class="runner-guidance">${escapeHtml(outcome.guidance)}</div>` : ""}
          ${outcome && outcome.imageUrl ? `<img class="outcome-image" src="${escapeHtml(outcome.imageUrl)}" alt="" />` : ""}
          ${(outcome && outcome.links && outcome.links.length) ? `
            <div class="runner-links">
              ${outcome.links.map((l) => `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.label || l.url)}</a>`).join("")}
            </div>` : ""}

          <div class="summary-block">
            <h3>Flow path</h3>
            <ul class="path-list">
              ${run.answers.map((a) => pathListItemHtml(a)).join("") || "<li class='muted'>No answers recorded</li>"}
            </ul>
          </div>

          <div class="summary-block" id="actionsBlock">
            <h3>Evidence / actions for key questions</h3>
            <ul class="actions-list">
              ${actions.length
                ? renderActionsListHtml(run, outcome.id, actions)
                : "<li class='muted' style='display:block'>No evidence actions listed for this outcome</li>"}
            </ul>
          </div>

          <div class="runner-actions no-print">
            <button class="btn btn-neutral btn-lg" id="btnPrint2">Print summary</button>
            <button class="btn btn-neutral btn-lg" id="btnExpJson">Export JSON</button>
            <button class="btn btn-neutral btn-lg" id="btnExpHtml">Export HTML</button>
            <button class="btn btn-primary btn-lg" id="btnDone">${run.isTest || app.testMode ? "Back to builder" : "Done"}</button>
          </div>
        </div>
      </div>
    `;

    bindActionStatusCycles(document.getElementById("actionsBlock"), run);
    document.getElementById("btnPrint2").onclick = () => window.print();
    bindRunExportButtons(document.getElementById("app"), run, wf);
    document.getElementById("btnDone").onclick = () => {
      if (run.isTest || app.testMode) {
        app.testMode = false;
        openBuilder(wf.id);
      } else {
        navigate("library");
      }
    };
  }

  // ─── Dropdowns (click outside to close) ─────────────────
  function openDropdown(root) {
    if (!root) return;
    const panel = root.querySelector("[data-dropdown-panel]");
    const toggle = root.querySelector("[data-dropdown-toggle]");
    if (panel) panel.classList.remove("hidden");
    if (toggle) toggle.setAttribute("aria-expanded", "true");
    root.classList.add("is-open");
    if (root.querySelector("#presetDrop")) app.showPresets = true;
  }

  function closeAllDropdowns() {
    app.showPresets = false;
    document.querySelectorAll("[data-dropdown]").forEach((root) => {
      const panel = root.querySelector("[data-dropdown-panel]");
      const toggle = root.querySelector("[data-dropdown-toggle]");
      if (panel) panel.classList.add("hidden");
      if (toggle) toggle.setAttribute("aria-expanded", "false");
      root.classList.remove("is-open");
    });
  }

  document.addEventListener("pointerdown", (e) => {
    if (e.target.closest("[data-dropdown]")) return;
    if (!document.querySelector("[data-dropdown].is-open") &&
        !document.querySelector("[data-dropdown-panel]:not(.hidden)")) return;
    closeAllDropdowns();
  });

  // ─── Render entry ──────────────────────────────────────
  function render() {
    if (app.view === "builder") renderBuilder();
    else if (app.view === "runner") renderRunner();
    else renderLibrary();
  }

  // Boot
  render();
})();
  </script>
</body>
</html>
